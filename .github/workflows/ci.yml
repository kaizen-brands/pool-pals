name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Astro check
    # Self-hosted Hetzner runner — see ~/Kaizen/skills/kb-ci-runner/SKILL.md
    runs-on: [self-hosted, linux, x64, hetzner-cx23]
    timeout-minutes: 15
    env:
      NODE_OPTIONS: --max-old-space-size=3072
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Astro check (typecheck)
        run: pnpm exec astro check
