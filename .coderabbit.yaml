# CodeRabbit config — Kaizen code factory. Mirrors config/code-factory/review-standards.md so
# CodeRabbit (multi-model advisory reviewer) and the Codex `ai-review` gate enforce ONE standard.
# Living doc — keep path_instructions in sync with review-standards.md.
# Schema: https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
language: en-US
reviews:
  profile: chill                 # signal over nitpicks
  request_changes_workflow: false  # pre_merge_checks stay non-blocking until error-mode promotion (Phase 2)
  high_level_summary: true
  high_level_summary_instructions: |
    This summary is the ONLY record the maintainer reads — assume they will NOT open the diff.
    Write for someone deciding in ~20 seconds whether to trust the merge (merge == deploy to
    production on Vercel). Structure it exactly:
    - **Verdict** — start with one of 🟢 routine / 🟡 worth a glance / 🔴 sensitive, then a
      half-sentence why. 🔴 whenever it touches auth, payments/Stripe, Convex schema or convex/**,
      .github/CI, env/secrets, or a data migration.
    - **TL;DR** — one plain-English sentence: what this PR does and the user-facing effect (if any). No jargon.
    - **Changes** — short bullets grouped by area (frontend / backend / convex / config / CI), one line each. Don't restate the diff line by line.
    - **Watch for** — anything that could break in production or behave unexpectedly. Omit the whole section if there's genuinely nothing.
    Keep it tight. A docs/copy/test/dependency-only PR should produce 3-4 lines, not a wall of text.
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/convex/**"
      instructions: "HIGH-RISK backend. Filenames MUST be camelCase (hyphens break `convex deploy`). Every query/mutation must enforce auth/authorization. Flag schema changes prominently."
    - path: "**/{app,pages}/api/**"
      instructions: "Validate input with Zod and delegate to the DAL — never access the DB directly here. Require an auth check before any data access."
    - path: "**/lib/db/**"
      instructions: "Data-access layer: requireUser at the boundary; batch reads (flag N+1 loops); this is the only place that touches the DB."
    - path: "**/*.{tsx,jsx}"
      instructions: "Use shadcn/ui primitives over raw HTML+Tailwind; use cn() for conditional classes; repeated styles → variants; colors → CSS vars/tokens; no relative cross-module imports (use @ aliases)."
    - path: "**/{package.json,pnpm-lock.yaml}"
      instructions: "Flag any new or changed dependency for supply-chain review."
  path_filters:
    - "!**/pnpm-lock.yaml"
    - "!**/*.generated.*"
    - "!**/_generated/**"
  # Static-analysis / security scanners CodeRabbit runs and feeds into the review (no-human factory → more checks).
  tools:
    gitleaks:
      enabled: true                # committed-secret scanning
    trufflehog:
      enabled: true                # verified secret detection
    semgrep:
      enabled: true                # SAST — security/quality patterns
    actionlint:
      enabled: true                # GitHub Actions workflow linting
    checkov:
      enabled: true                # IaC misconfiguration scanning
  # Pre-merge checks — PHASE 1: all WARNING (visible, NON-blocking) to measure false-positive rate.
  # PHASE 2 (after ~1-2 weeks proving precision): promote reliable checks to `error`, set
  # request_changes_workflow: true, and add CodeRabbit's check as a required status check in the ruleset
  # so auto-merge respects it. The "Ignore failed checks" override (owner) is the escape hatch.
  pre_merge_checks:
    title:
      mode: warning
      requirements: "Conventional Commits: type(scope): subject. type ∈ feat|fix|chore|docs|refactor|test|perf|build|ci."
    description:
      mode: warning
    custom_checks:
      - name: "Convex filename casing"
        mode: warning
        instructions: "Files under any convex/ directory must be camelCase — no hyphens or snake_case (hyphens break `convex deploy`). Fail if a changed file under convex/ has a non-camelCase filename."
      - name: "API route auth check"
        mode: warning
        instructions: "Any new or modified route handler under app/api/** or pages/api/** must perform an authentication/authorization check (e.g. requireUser / session validation) before reading or writing data. Flag handlers that access data with no auth check."
      - name: "DAL boundary"
        mode: warning
        instructions: "Direct database access (Convex ctx.db, Prisma, Drizzle, raw SQL) should occur only in the data-access layer (lib/db/**, convex/**) or server actions that delegate to it — never directly in React components, pages, or API routes. Flag direct DB calls outside the DAL."
      - name: "No leftover stubs"
        mode: warning
        instructions: "Flag shipped (non-test) code paths containing TODO/FIXME placeholders, `throw new Error('not implemented')`, or empty/stub function bodies that indicate an incomplete implementation."
# Knowledge base: review against OUR architecture docs + learn across the whole fleet.
knowledge_base:
  learnings:
    scope: global                  # dismissed/accepted/chat learnings apply across all repos
  code_guidelines:
    enabled: true
    filePatterns:                  # the actual standards docs in our repos
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
      - "**/.cursor/rules/**"
